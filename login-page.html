<!DOCTYPE html>
<head>
 <html   lang="en">
    <meta name="viewport"content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Black House Media</title>
    <link rel="icon" type="image/png" sizes="16x16" href="resourses/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="index.css">
</head>
    <body class="login-page">
        <!-------------- Header ----------------------->
        <header>
              <!-- Preloader -->
<div id="preloader">
  <div class="dots-container">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
 </div>
 <div class="auth-wrapper">
    <div class="auth-card">
        <div class="brand-zone">
            <h1>BLACK HOUSE <span>MEDIA</span></h1>
             <h2 id="auth-title">WELCOME</h2>
             <p id="auth-subtittle">CREATE AN ACCOUNT</p>
             <div class="toggle-bar">
                <button id="loginTab">LOGIN</button>
                <button id="signupTab" class="active" >SIGNUP</button>
            </div>
        </div>
        <form id="authForm">
            <div class="input-field">
                 <label>Email Address<i class="fa-solid fa-envelope"></i></label>
                <input type="email" id="email" required placeholder="blackhousemedia@gmail.co.ug">
            </div>
                        <div class="input-field" style="position:relative;">
                                <label>Password<i class="fa-solid fa-lock"></i></label>
                                <input type="password" id="password" required placeholder="eg.#08Bh!*40">
                                <span id="togglePassword" style="position:absolute; right:1.2rem; top:3.2rem; cursor:pointer; color:#888; font-size:1.7rem;">
                                    <i class="fa-solid fa-eye"></i>
                                </span>
                        </div>
            <div id="signoutoptions" class="input-field hidden">
                <label>User Role<i class="fa-solid fa-user-tie"></i></label>
                <select id="userRole" aria-label="Select UserRole">
                    <option value="entertainment.html">ENTERTAINMENT</option>
                    <option value="services.html">SERVICES</option>
                    <option value="software.html">SOFTWARE</option>
                    <option value="admin-partner">PARTNER</option>
                </select>
            </div>
            <!-------- social media authentication.=======================
             <div class="auth-0ptions-lable">
                <span>Signin with</span>
             </div>
             <div class="social-auth-container">
                <button class="social-box google" onclick="handleGoogleLogin()"><i class="fa-brands fa-google"></i></button>
                <span>Google</span>
             </div>
             -------->
             <div id="statusMessage"></div>
        <button type="submit" id="proceedBtn" class="primary-btn">PROCEED SIGNUP</button>
        </form>

    </div>
 </div>
 <script  src="auth.js"></script>
 <script>
     // Password visibility toggle
     const passwordInput = document.getElementById('password');
     const togglePassword = document.getElementById('togglePassword');
     let pwVisible = false;
     togglePassword.addEventListener('click', function() {
         pwVisible = !pwVisible;
         passwordInput.type = pwVisible ? 'text' : 'password';
         togglePassword.innerHTML = pwVisible ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye"></i>';
     });
     // Update button text on tab switch
     const loginTab = document.getElementById('loginTab');
     const signupTab = document.getElementById('signupTab');
     const proceedBtn = document.getElementById('proceedBtn');
     loginTab.addEventListener('click', () => { proceedBtn.textContent = 'PROCEED LOGIN'; });
     signupTab.addEventListener('click', () => { proceedBtn.textContent = 'PROCEED SIGNUP'; });
 </script>
 <script src="preloader.js"></script>
 <script type="module" src="script.js"></script>
    </body>
</head>
</html>

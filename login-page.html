<!DOCTYPE html>
<head>
 <html   lang="en">
    <meta name="viewport"content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Black House Media</title>
    <link rel="icon" type="image/png" sizes="16x16" href="resourses/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="index.css">
</head>
    <body class="login-page">
        <!-------------- Header ----------------------->
        <header>
              <!-- Preloader -->
<div id="preloader">
  <div class="dots-container">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
 </div>
 <div class="auth-wrapper">
    <div class="auth-card">
        <div class="brand-zone">
            <h1>BLACK HOUSE <span>MEDIA</span></h1>
             <h2 id="auth-title">WELCOME</h2>
             <p id="auth-subtittle">CREATE AN ACCOUNT</p>
             <div class="toggle-bar">
                <button id="loginTab class="active" onclick="SwitchTab('Login')">LOGIN</button>
                <button id="signupTab" class="active" onclick="SwitchTab('signup')">SIGNUP</button>
            </div>
        </div>
        <form id="authForm">
            <div class="input-field">
                 <label>Email Address<i class="fa-solid fa-envelope"></i></label>
                <input type="email" id="email" required placeholder="blackhousemedia@gmail.co.ug">
            </div>
            <div class="input-field">
                <label>Password<i class="fa-solid fa-lock"></i></label>
                <input type="password" id="password" required placeholder="eg.#08Bh!*40">
            </div>
            <div id="signoutoptions" class="input-field hidden">
                <label>User Role<i class="fa-solid fa-user-tie"></i></label>
                <select id="userRole" aria-label="Select UserRole">
                    <option value="entertainment.html">ENTERTAINMENT</option>
                    <option value="services.html">SERVICES</option>
                    <option value="software.html">SOFTWARE</option>
                    <option value="admin-partner">PARTNER</option>
                </select>
            </div>
            <!-------- social media authentication.=======================
             <div class="auth-0ptions-lable">
                <span>Signin with</span>
             </div>
             <div class="social-auth-container">
                <button class="social-box google" onclick="handleGooglrLogin()"><i class="fa-brands fa-google"></i></button>
                <span>Google</span>
             </div>
             -------->
             <div id="statusMessage"></div>
        <button type="submit" id="proceedBtn" class="primary-btn">PROCEED</button>
        </form>

    </div>
 </div>
 <script  src="preloader.js"></script>
 <script type="module" src="script.js"></script>
    </body>
</head>
</html>
